# ============================================================================
# Firebase App Distribution — Signed Android APK
# ============================================================================
#
# Builds a signed release APK and uploads it to Firebase App Distribution.
# Triggers on push to the deploy/replit branch.
#
# Required GitHub Secrets:
#   FIREBASE_APP_ID_ANDROID       — Firebase App ID (1:xxxx:android:xxxx)
#   FIREBASE_SERVICE_ACCOUNT_JSON — Full JSON of Firebase service account key
#   FIREBASE_TESTERS              — Comma-separated tester emails
#   ANDROID_KEYSTORE_BASE64       — Base64-encoded release keystore (.jks)
#   ANDROID_KEY_ALIAS             — Key alias inside the keystore
#   ANDROID_KEYSTORE_PASSWORD     — Keystore password
#   ANDROID_KEY_PASSWORD          — Key password
#
# Versioning:
#   versionCode = GitHub run number (auto-incrementing)
#   versionName = "1.0.<run_number>"
#
# APK output:
#   client/android/app/build/outputs/apk/release/app-release.apk
# ============================================================================

name: Firebase App Distribution

on:
  push:
    branches: [deploy/replit]

jobs:
  build-and-distribute:
    name: Build Signed APK & Distribute
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Node.js 22 (for Vite build + Capacitor sync)
      # ------------------------------------------------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      # ------------------------------------------------------------------
      # 3. Java 21 (for Gradle/Android build)
      # ------------------------------------------------------------------
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # ------------------------------------------------------------------
      # 4. Install npm dependencies
      # ------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # ------------------------------------------------------------------
      # 5. Build web app and sync to Capacitor Android
      # ------------------------------------------------------------------
      - name: Build web app and sync to Android
        run: npm run cap:build

      # ------------------------------------------------------------------
      # 6. Decode release keystore from base64 secret
      #    printf avoids echo's trailing newline corrupting the binary.
      #    Written next to build.gradle so storeFile can be a relative path.
      # ------------------------------------------------------------------
      - name: Decode release keystore
        run: printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/release.jks

      # ------------------------------------------------------------------
      # 7. Verify keystore is readable (fail fast if secret is corrupt)
      # ------------------------------------------------------------------
      - name: Verify keystore
        run: keytool -list -v -keystore android/release.jks -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > /dev/null

      # ------------------------------------------------------------------
      # 8. Write keystore.properties for Gradle signing config
      #    Placed at client/android/keystore.properties (rootProject dir).
      #    storeFile is relative to the app module dir.
      # ------------------------------------------------------------------
      - name: Write keystore.properties
        run: |
          cat > android/keystore.properties << PROPS
          storeFile=../release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          PROPS

      # ------------------------------------------------------------------
      # 9. Build signed release APK (was step 8)
      #    VERSION_CODE and VERSION_NAME are read by build.gradle.
      #    versionCode = run_number (auto-incrementing integer)
      #    versionName = "1.0.<run_number>" (human-readable)
      # ------------------------------------------------------------------
      - name: Build signed release APK
        working-directory: client/android
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: "1.0.${{ github.run_number }}"
        run: ./gradlew assembleRelease

      # ------------------------------------------------------------------
      # 9. Verify signed APK exists
      # ------------------------------------------------------------------
      - name: Verify release APK
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "::error::Release APK not found at $APK_PATH"
            exit 1
          fi
          echo "APK size: $(du -h "$APK_PATH" | cut -f1)"

      # ------------------------------------------------------------------
      # 10. Install Firebase CLI
      # ------------------------------------------------------------------
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # ------------------------------------------------------------------
      # 11. Write Firebase service account key
      # ------------------------------------------------------------------
      - name: Write Firebase service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > "$RUNNER_TEMP/firebase-sa.json"

      # ------------------------------------------------------------------
      # 12. Upload to Firebase App Distribution
      #     Testers receive email notification with download link.
      #     Release notes include branch, commit, run, and version.
      # ------------------------------------------------------------------
      - name: Upload to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          firebase appdistribution:distribute \
            android/app/build/outputs/apk/release/app-release.apk \
            --app "${{ secrets.FIREBASE_APP_ID_ANDROID }}" \
            --testers "${{ secrets.FIREBASE_TESTERS }}" \
            --release-notes "v1.0.${{ github.run_number }} | Branch: ${{ github.ref_name }} | Commit: ${{ github.sha }} | Run: #${{ github.run_number }}"

      # ------------------------------------------------------------------
      # 13. Clean up all secrets from runner
      # ------------------------------------------------------------------
      - name: Clean up credentials
        if: always()
        run: |
          rm -f android/release.jks
          rm -f android/keystore.properties
          rm -f "$RUNNER_TEMP/firebase-sa.json"

      # ------------------------------------------------------------------
      # 14. Upload APK as GitHub artifact (backup download)
      # ------------------------------------------------------------------
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pcs-moveiq-v1.0.${{ github.run_number }}
          path: client/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
